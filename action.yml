name: "Mark Ready When Ready"
description: >-
  Automatically marks a draft PR as ready for review once all required checks
  pass. Label it, walk away, come back ready.

branding:
  icon: "check-circle"
  color: "green"

inputs:
  github-token:
    description: >
      A GitHub token with permission to read checks/statuses and write
      to pull requests and contents. Can be GITHUB_TOKEN (with contents: write
      permission) or a GitHub App token.
    required: true
  label:
    description: "The label that triggers the action."
    required: false
    default: "Mark Ready When Ready"
  pause-seconds:
    description: >
      Seconds to pause between the first and second round of check
      verification. This helps catch late-arriving or re-triggered checks.
    required: false
    default: "20"
  remove-label:
    description: "Whether to remove the trigger label after marking the PR ready."
    required: false
    default: "true"

outputs:
  result:
    description: >
      Outcome of the action: "ready" if the PR was marked ready,
      "failing-checks" if required checks failed, "conflicting" if the
      PR has merge conflicts, or "skipped" if preconditions were not met.
    value: ${{ steps.resolve.outputs.result }}
  failing-checks:
    description: "Names of required checks that failed (if any)."
    value: ${{ steps.resolve.outputs.failing_checks }}

runs:
  using: "composite"
  steps:
    - name: Validate token permissions
      id: validate-permissions
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO_NWO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        missing=()
        head_sha="${{ github.event.pull_request.head.sha }}"

        # Check contents:write by trying to create an unreferenced blob
        # (harmless — orphaned blobs are cleaned up by git GC)
        blob_result=$(gh api "repos/$REPO_NWO/git/blobs" -X POST -f content="" -f encoding="utf-8" 2>&1) || true
        if echo "$blob_result" | grep -qi "Resource not accessible\|403\|Not Found"; then
          missing+=("contents: write")
        fi

        # Check pull-requests:write by verifying we can read the PR
        # (if we can't even read it, write is definitely missing)
        if ! gh api "repos/$REPO_NWO/pulls/$PR_NUMBER" --silent 2>/dev/null; then
          missing+=("pull-requests: write")
        fi

        # Check checks:read by verifying we can list check runs
        if ! gh api "repos/$REPO_NWO/commits/$head_sha/check-runs?per_page=1" --silent 2>/dev/null; then
          missing+=("checks: read")
        fi

        # Check statuses:read by verifying we can list commit statuses
        if ! gh api "repos/$REPO_NWO/commits/$head_sha/statuses?per_page=1" --silent 2>/dev/null; then
          missing+=("statuses: read")
        fi

        if [ ${#missing[@]} -gt 0 ]; then
          echo ""
          echo "::error::❌ Token is missing required permissions: ${missing[*]}"
          echo ""
          echo "Add these permissions at the workflow or job level:"
          echo ""
          echo "  permissions:"
          echo "    checks: read"
          echo "    contents: write"
          echo "    pull-requests: write"
          echo "    statuses: read"
          echo ""
          echo "See: https://github.com/kenyonj/mark-ready-when-ready#required-permissions"
          exit 1
        fi

        echo "::notice::✅ Token permissions verified"

    - name: Check preconditions
      id: preconditions
      shell: bash
      env:
        PR_DRAFT: ${{ github.event.pull_request.draft }}
        PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        LABEL: ${{ inputs.label }}
      run: |
        if [ "$PR_DRAFT" != "true" ]; then
          echo "::notice::PR is not a draft — skipping"
          echo "should_run=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        if ! echo "$PR_LABELS" | jq -e --arg label "$LABEL" '. | index($label)' > /dev/null 2>&1; then
          echo "::notice::Label '$LABEL' not found on PR — skipping"
          echo "should_run=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "should_run=true" >> $GITHUB_OUTPUT

    - name: Wait for required checks (round 1)
      id: wait-once
      if: steps.preconditions.outputs.should_run == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_NWO: ${{ github.repository }}
      run: |
        output=$(gh pr checks "$PR_NUMBER" --repo "$REPO_NWO" --watch --required --fail-fast 2>&1) && exit 0
        if echo "$output" | grep -q "no required checks"; then
          echo "::notice::No required checks configured — skipping"
          echo "no_required_checks=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "$output"
        exit 1

    - name: Pause between verification rounds
      if: steps.preconditions.outputs.should_run == 'true' && steps.wait-once.outcome == 'success' && steps.wait-once.outputs.no_required_checks != 'true'
      shell: bash
      run: sleep ${{ inputs.pause-seconds }}

    - name: Wait for required checks (round 2)
      id: wait-again
      if: steps.preconditions.outputs.should_run == 'true' && steps.wait-once.outcome == 'success' && steps.wait-once.outputs.no_required_checks != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_NWO: ${{ github.repository }}
      run: |
        gh pr checks "$PR_NUMBER" --repo "$REPO_NWO" --watch --required --fail-fast

    - name: Verify required checks via GraphQL
      id: trust-but-verify
      if: steps.preconditions.outputs.should_run == 'true' && steps.wait-once.outcome == 'success' && steps.wait-once.outputs.no_required_checks != 'true' && steps.wait-again.outcome == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_BASE_OWNER: ${{ github.event.pull_request.base.repo.owner.login }}
        PR_BASE_REPO: ${{ github.event.pull_request.base.repo.name }}
      run: |
        all_check_runs='[]'
        has_next_page=true
        cursor=""

        while [ "$has_next_page" = "true" ]; do
          if [ -z "$cursor" ]; then
            cursor_param=""
          else
            cursor_param=", after: \"$cursor\""
          fi

          response=$(gh api graphql -f query="query {
            repository(owner: \"$PR_BASE_OWNER\", name: \"$PR_BASE_REPO\") {
              pullRequest(number: $PR_NUMBER) {
                mergeable
                commits(last: 1) {
                  nodes {
                    commit {
                      checkSuites(first: 100${cursor_param}) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          checkRuns(
                            first: 100
                            filterBy: {checkType: LATEST, conclusions: [ACTION_REQUIRED, TIMED_OUT, CANCELLED, FAILURE, STARTUP_FAILURE]}
                          ) {
                            nodes {
                              name
                              isRequired(pullRequestNumber: $PR_NUMBER)
                            }
                          }
                        }
                      }
                      status {
                        contexts {
                          context
                          state
                          isRequired(pullRequestNumber: $PR_NUMBER)
                        }
                      }
                    }
                  }
                }
              }
            }
          }")

          page_check_runs=$(echo "$response" | jq 'try .data.repository.pullRequest.commits.nodes[].commit.checkSuites.nodes[].checkRuns.nodes[] // empty')
          if [ "$all_check_runs" = "[]" ]; then
            all_check_runs=$(echo "$page_check_runs" | jq -s '.')
          else
            all_check_runs=$(echo "$all_check_runs" | jq --argjson new_runs "$(echo "$page_check_runs" | jq -s '.')" '. + $new_runs')
          fi

          has_next_page=$(echo "$response" | jq -r '.data.repository.pullRequest.commits.nodes[].commit.checkSuites.pageInfo.hasNextPage // false')
          cursor=$(echo "$response" | jq -r '.data.repository.pullRequest.commits.nodes[0].commit.checkSuites.pageInfo.endCursor // ""')

          if [ ! -f /tmp/pr_info_$PR_NUMBER.json ]; then
            echo "$response" > /tmp/pr_info_$PR_NUMBER.json
          fi
        done

        failing_suites=$(echo "$all_check_runs" | jq -r '.[] | select(.isRequired == true) | .name')
        failing_statuses=$(jq -r '.data.repository.pullRequest.commits.nodes[].commit.status.contexts[] | select(.isRequired == true) | select(.state == "FAILURE") | .context' /tmp/pr_info_$PR_NUMBER.json 2>/dev/null || echo "")
        mergeable=$(jq -r '.data.repository.pullRequest.mergeable' /tmp/pr_info_$PR_NUMBER.json)

        echo "failing_required_check_suites=$failing_suites" >> $GITHUB_OUTPUT
        echo "failing_required_statuses=$failing_statuses" >> $GITHUB_OUTPUT
        echo "mergeable=$mergeable" >> $GITHUB_OUTPUT

        rm -f /tmp/pr_info_$PR_NUMBER.json

        echo "::group::Verification results"
        echo "Required check suites that failed: $failing_suites"
        echo "Required commit statuses that failed: $failing_statuses"
        echo "Mergeable state: $mergeable"
        echo "::endgroup::"

    - name: Mark PR as ready for review
      id: mark-ready
      if: |
        steps.preconditions.outputs.should_run == 'true' &&
        steps.wait-once.outputs.no_required_checks != 'true' &&
        steps.wait-once.outcome == 'success' &&
        steps.wait-again.outcome == 'success' &&
        steps.trust-but-verify.outcome == 'success' &&
        steps.trust-but-verify.outputs.failing_required_check_suites == '' &&
        steps.trust-but-verify.outputs.failing_required_statuses == '' &&
        steps.trust-but-verify.outputs.mergeable != 'CONFLICTING'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_NWO: ${{ github.repository }}
        REMOVE_LABEL: ${{ inputs.remove-label }}
        LABEL: ${{ inputs.label }}
      run: |
        if ! gh pr ready "$PR_NUMBER" --repo "$REPO_NWO" 2>&1; then
          echo ""
          echo "::error::Failed to mark PR as ready for review."
          echo "::error::Ensure your workflow includes 'contents: write' permission — without it, GITHUB_TOKEN cannot call markPullRequestReadyForReview."
          echo "::error::See: https://github.com/kenyonj/mark-ready-when-ready#required-permissions"
          exit 1
        fi

        if [ "$REMOVE_LABEL" = "true" ]; then
          gh pr edit "$PR_NUMBER" --repo "$REPO_NWO" --remove-label "$LABEL"
        fi

    - name: Resolve outcome
      id: resolve
      if: always()
      shell: bash
      env:
        SHOULD_RUN: ${{ steps.preconditions.outputs.should_run }}
        NO_REQUIRED_CHECKS: ${{ steps.wait-once.outputs.no_required_checks }}
        WAIT_ONCE: ${{ steps.wait-once.outcome }}
        WAIT_AGAIN: ${{ steps.wait-again.outcome }}
        VERIFY: ${{ steps.trust-but-verify.outcome }}
        MARK_READY: ${{ steps.mark-ready.outcome }}
        FAILING_SUITES: ${{ steps.trust-but-verify.outputs.failing_required_check_suites }}
        FAILING_STATUSES: ${{ steps.trust-but-verify.outputs.failing_required_statuses }}
        MERGEABLE: ${{ steps.trust-but-verify.outputs.mergeable }}
      run: |
        if [ "$SHOULD_RUN" != "true" ] || [ "$NO_REQUIRED_CHECKS" = "true" ]; then
          echo "result=skipped" >> $GITHUB_OUTPUT
          echo "failing_checks=" >> $GITHUB_OUTPUT
          exit 0
        fi

        failing_checks="$FAILING_SUITES"
        if [ -n "$FAILING_STATUSES" ]; then
          if [ -n "$failing_checks" ]; then
            failing_checks="$failing_checks $FAILING_STATUSES"
          else
            failing_checks="$FAILING_STATUSES"
          fi
        fi
        echo "failing_checks=$failing_checks" >> $GITHUB_OUTPUT

        if [ "$MARK_READY" = "success" ]; then
          echo "result=ready" >> $GITHUB_OUTPUT
        elif [ "$MERGEABLE" = "CONFLICTING" ]; then
          echo "result=conflicting" >> $GITHUB_OUTPUT
        elif [ -n "$failing_checks" ]; then
          echo "result=failing-checks" >> $GITHUB_OUTPUT
        elif [ "$WAIT_ONCE" != "success" ] || [ "$WAIT_AGAIN" != "success" ]; then
          echo "result=failing-checks" >> $GITHUB_OUTPUT
        else
          echo "result=skipped" >> $GITHUB_OUTPUT
        fi
